<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Network Exam Pro - Gemini Style</title>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0" />
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="sidebar" id="sidebar">
        <span class="material-symbols-outlined menu-toggle" onclick="toggleSidebar()">menu</span>
        <div class="new-chat" onclick="location.reload()">
            <span class="material-symbols-outlined add">add</span>
            <p class="text">重新開始</p>
        </div>
        <div class="recent">
            <p>最近紀錄</p>
            <div class="recent-history" id="recent-history">
                <!-- History items will be added here -->
            </div>
        </div>
    </div>

    <div class="container">
        <nav>
            <div class="gemini">
                <p>Network Exam Pro</p>
                <span class="material-symbols-outlined">arrow_drop_down</span>
            </div>
            <div class="right">
                <div class="gem-adv">
                    <span class="material-symbols-outlined" style="font-size: 18px; margin:0; padding:0; color: #38bdf8;">verified</span>
                    <p>125 題完整版</p>
                </div>
                <img src="https://api.dicebear.com/7.x/avataaars/svg?seed=Manus" alt="user" width="40" height="40">
            </div>
        </nav>

        <div id="stats-container">
            <div id="stats-text">已刷: 0 / 25 (0%)</div>
            <div id="progress-wrapper">
                <div id="progress-fill"></div>
            </div>
        </div>

        <main id="main-content">
            <!-- Start View -->
            <div id="start-view" class="view">
                <div class="heading">
                    <p><span class="gradient-text">你好，準備好挑戰了嗎？</span></p>
                    <p style="font-size: 30px; margin-top: 10px; color: #94a3b8;">資訊網路課程 125 題全題庫隨機測驗</p>
                </div>
                <div class="suggestions">
                    <div onclick="startQuiz()">
                        <p>開始隨機 25 題測驗</p>
                        <span class="material-symbols-outlined">play_arrow</span>
                    </div>
                    <div>
                        <p>直接進入考試模式，不可修改答案</p>
                        <span class="material-symbols-outlined">timer</span>
                    </div>
                </div>
            </div>

            <!-- Quiz View -->
            <div id="quiz-view" class="view" style="display: none;">
                <div class="question-container">
                    <div class="question-header">
                        <img src="https://www.gstatic.com/lamda/images/gemini_sparkle_v002.svg" alt="gemini">
                        <h2 id="question-text">載入中...</h2>
                    </div>
                    <div class="options-list" id="options-box">
                        <!-- Options will be added here -->
                    </div>
                </div>
            </div>

            <!-- Result View -->
            <div id="result-view" class="view" style="display: none;">
                <div class="heading">
                    <p><span class="gradient-text" id="result-title">測驗結束</span></p>
                    <div class="score-display" id="score-val">0</div>
                    <p id="comment-text" style="font-size: 24px; color: #94a3b8;"></p>
                </div>
                <div class="suggestions" style="margin-top: 50px;">
                    <div onclick="location.reload()">
                        <p>重新刷題</p>
                        <span class="material-symbols-outlined">refresh</span>
                    </div>
                </div>
            </div>
        </main>

        <div class="footer">
            <p>Powered by Manus & Gemini Style UI | 125 題完整題庫</p>
        </div>
    </div>

    <script src="index.js"></script>
</body>
</html>
