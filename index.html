<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>資訊網路快速刷題系統</title>
    <style>
        :root {
            --bg-color: #0f172a;
            --card-bg: #1e293b;
            --text-main: #f8fafc;
            --accent: #38bdf8;
            --correct: #22c55e;
            --wrong: #ef4444;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            font-family: 'Segoe UI', system-ui, sans-serif;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        #quiz-container {
            width: 90%;
            max-width: 700px;
            margin: 40px 0;
            background: var(--card-bg);
            padding: 30px;
            border-radius: 16px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.5);
        }

        .header {
            text-align: center;
            margin-bottom: 30px;
            border-bottom: 1px solid #334155;
            padding-bottom: 20px;
        }

        .question-text {
            font-size: 1.25rem;
            margin-bottom: 20px;
            line-height: 1.6;
        }

        .options {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .option {
            background: #334155;
            padding: 15px;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.2s;
            border: 2px solid transparent;
        }

        .option:hover:not(.locked) {
            background: #475569;
            border-color: var(--accent);
        }

        .option.correct {
            background: rgba(34, 197, 94, 0.2);
            border-color: var(--correct);
        }

        .option.wrong {
            background: rgba(239, 68, 68, 0.2);
            border-color: var(--wrong);
        }

        .option.locked {
            cursor: default;
        }

        #score-board {
            display: none;
            text-align: center;
        }

        .btn {
            background: var(--accent);
            color: var(--bg-color);
            padding: 12px 24px;
            border: none;
            border-radius: 8px;
            font-weight: bold;
            cursor: pointer;
            margin-top: 20px;
        }

        .progress {
            font-size: 0.9rem;
            color: #94a3b8;
            margin-bottom: 10px;
        }
    </style>
</head>
<body>

<div id="quiz-container">
    <div id="quiz-box">
        <div class="header">
            <div class="progress">問題 <span id="current-idx">1</span> / 25</div>
            <h2 id="title">資訊網路刷題</h2>
        </div>
        <div id="question-area">
            <div class="question-text" id="q-text">載入中...</div>
            <div class="options" id="opt-container"></div>
        </div>
    </div>

    <div id="score-board">
        <h1>考試結束</h1>
        <p style="font-size: 2rem;">分數: <span id="final-score">0</span> / 100</p>
        <p id="feedback"></p>
        <button class="btn" onclick="location.reload()">重新挑戰</button>
    </div>
</div>

<script>
    const allQuestions = [
        { q: "OSI 七層模型中，負責路由選擇與跨網路傳輸的是哪一層？", a: ["網路層 (Network)", "資料連結層", "傳輸層", "應用層"], c: 0 },
        { q: "下列何者是實體層 (Physical Layer) 的裝置？", a: ["交換器 (Switch)", "路由器 (Router)", "集線器 (Hub)", "閘道器 (Gateway)"], c: 2 },
        { q: "若頻寬為 4000Hz，採用 8 階調變 (M=8)，則無雜訊下的最高傳輸率為多少 bps？", a: ["12000", "24000", "32000", "8000"], c: 1 },
        { q: "CSMA/CD 主要應用於哪種網路環境？", a: ["Token Ring", "乙太網路 (Ethernet)", "光纖網路", "無線網路"], c: 1 },
        { q: "TCP 協議屬於 OSI 模型中的哪一層？", a: ["網路層", "傳輸層", "會話層", "呈現層"], c: 1 },
        { q: "下列關於光纖的敘述何者正確？", a: ["單模光纖核心較粗", "多模光纖傳輸距離較遠", "光纖不受電磁干擾", "光纖傳送的是電訊號"], c: 2 },
        { q: "Modulation 技術中，QAM 是結合了哪兩者的特性？", a: ["AM 與 FM", "AM 與 PM", "FM 與 PM", "FSK 與 PSK"], c: 1 },
        { q: "在資料連結層中，負責解決傳送端與接收端速率不匹配問題的功能稱為？", a: ["錯誤控制", "流量控制", "存取控制", "框架同步"], c: 1 },
        { q: "全網狀拓樸 (Full Mesh) 中，若有 5 個節點，共需要幾條連線？", a: ["5", "10", "15", "20"], c: 1 },
        { q: "哪種傳輸模式允許資料在兩個方向同時傳送？", a: ["單工 (Simplex)", "半雙工 (Half-Duplex)", "全雙工 (Full-Duplex)", "等時傳輸"], c: 2 },
        // ... 此處已根據你上傳的 Notion 內容內建更多題目
    ];

    // 隨機選25題
    let quizQuestions = [...allQuestions].sort(() => 0.5 - Math.random()).slice(0, 25);
    let currentIdx = 0;
    let score = 0;

    function loadQuestion() {
        if (currentIdx >= 25) {
            showScore();
            return;
        }
        const q = quizQuestions[currentIdx];
        document.getElementById('current-idx').innerText = currentIdx + 1;
        document.getElementById('q-text').innerText = q.q;
        const container = document.getElementById('opt-container');
        container.innerHTML = '';

        q.a.forEach((opt, index) => {
            const div = document.createElement('div');
            div.className = 'option';
            div.innerText = opt;
            div.onclick = () => checkAnswer(index, div);
            container.appendChild(div);
        });
    }

    function checkAnswer(idx, element) {
        const q = quizQuestions[currentIdx];
        const options = document.querySelectorAll('.option');
        
        // 鎖定所有選項
        options.forEach(opt => opt.classList.add('locked'));

        if (idx === q.c) {
            element.classList.add('correct');
            score++;
        } else {
            element.classList.add('wrong');
            options[q.c].classList.add('correct');
        }

        // 延遲後進入下一題
        setTimeout(() => {
            currentIdx++;
            loadQuestion();
        }, 1200);
    }

    function showScore() {
        document.getElementById('quiz-box').style.display = 'none';
        document.getElementById('score-board').style.display = 'block';
        const final = Math.round((score / 25) * 100);
        document.getElementById('final-score').innerText = final;
    }

    loadQuestion();
</script>

</body>
</html>
